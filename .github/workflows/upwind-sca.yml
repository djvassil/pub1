name: Upwind SCA Scan

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # lets you also trigger the scan manually from the Actions tab

jobs:
  sca-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build the test image
        run: docker build -t sca-test-app:latest .

      - name: Upwind ShiftLeft SCA scan
        uses: upwindsecurity/shiftleft-create-image-scan-event-action@main
        with:
          upwind_client_id: ${{ secrets.UPWIND_CLIENT_ID }}
          upwind_client_secret: ${{ secrets.UPWIND_CLIENT_SECRET }}
          docker_image: 'sca-test-app:latest'
          pull_image: false
          block_on: do_not_deploy

      - name: Upwind ShiftLeft image publish
        uses: upwindsecurity/shiftleft-create-image-publish-event-action@main
        with:
          upwind_client_id: ${{ secrets.UPWIND_CLIENT_ID }}
          upwind_client_secret: ${{ secrets.UPWIND_CLIENT_SECRET }}
          docker_image: 'sca-test-app:latest'
          pull_image: false
